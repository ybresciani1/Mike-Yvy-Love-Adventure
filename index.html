<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike & Yvy: A Love Story (RPG Edition)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 8px solid #4a3b2a;
            border-radius: 4px;
            position: relative;
            background: #000;
        }
        #scrolling-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #000;
            border-bottom: 2px solid #333;
            overflow: hidden;
            z-index: 100;
            display: none; /* Hidden by default */
            font-family: 'Courier New', Courier, monospace;
        }
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: scroll-left 20s linear infinite;
            color: #0f0; /* Terminal Green */
            font-size: 18px;
            font-weight: bold;
            line-height: 30px;
            padding-left: 100%;
        }
        @keyframes scroll-left {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        #ui-layer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        
        .dialogue-box {
            background: #e1c699;
            border: 4px solid #8b4513;
            border-radius: 5px;
            padding: 15px;
            width: 100%;
            min-height: 80px;
            display: none; /* Changed to flex in JS */
            flex-direction: row;
            align-items: flex-start;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            box-sizing: border-box;
            pointer-events: auto;
        }
        
        .portrait-frame {
            width: 100px;
            height: 100px;
            border: 4px solid #8b4513;
            background-color: #d2b48c; /* Fallback color */
            border-radius: 4px;
            flex-shrink: 0;
            display: none; /* Hidden by default */
            overflow: hidden;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%; 
            image-rendering: pixelated;
        }

        .dialogue-text {
            color: #3e2723;
            font-size: 18px;
            font-weight: bold;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            flex-grow: 1;
            margin-top: 5px;
        }

        .interaction-hint {
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-size: 20px;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
            display: none;
        }
        
        /* Wardrobe Modal */
        #wardrobe-modal, #restaurant-menu-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff8e1;
            border: 4px solid #5d4037;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            font-family: 'Courier New', Courier, monospace;
        }
        #wardrobe-modal h2, #restaurant-menu-modal h2 { margin-top: 0; color: #3e2723; }
        .outfit-btn {
            display: block;
            width: 200px;
            padding: 10px;
            margin: 10px auto;
            background: #8d6e63;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
        }
        .outfit-btn:hover { background: #6d4c41; }
        #btn-confirm { background: #2e7d32; }
        #btn-confirm:hover { background: #1b5e20; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="scrolling-banner">
            <div class="marquee">
                FLIGHT 214 TO SAN DIEGO: ON TIME --- GATE 12B: BOARDING --- WELCOME TO DCA AIRPORT --- MIKE, DON'T FORGET YOUR BOARDING PASS --- TRAVEL ADVISORY: PACK LIGHT ---
            </div>
        </div>
        
        <!-- Wardrobe UI -->
        <div id="wardrobe-modal">
            <h2>Select Work Outfit</h2>
            <button class="outfit-btn" id="btn-suit">Business Suit</button>
            <button class="outfit-btn" id="btn-casual">Smart Casual</button>
            <button class="outfit-btn" id="btn-confirm">Confirm Look</button>
        </div>

        <!-- Restaurant Menu UI -->
        <div id="restaurant-menu-modal">
            <h2>Order Dinner</h2>
            <button class="outfit-btn" id="btn-order-tacos">Tacos</button>
            <button class="outfit-btn" id="btn-order-pizza">Pizza</button>
            <button class="outfit-btn" id="btn-order-spaghetti">Spaghetti</button>
        </div>

        <div id="ui-layer">
            <div id="interaction-hint" class="interaction-hint">PRESS SPACE</div>
            <div id="dialogue-box" class="dialogue-box">
                <div id="portrait-frame" class="portrait-frame">
                    <img id="portrait-img" src="https://i.ibb.co/5XNnfJFc/IMG-8277.jpg" alt="Portrait" onerror="this.style.display='none'; this.parentElement.style.backgroundColor='#3498db';">
                </div>
                <div id="dialogue-text" class="dialogue-text"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Game Constants & State ---
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const TILE_SIZE = 32;

        const COLORS = {
            mike: 0x3498db,
            yvy_club: 0xe91e63,
            marine: 0x2d5a27,
            tsa: 0x3f51b5,
            floor: 0x8d6e63,
            starbucks: 0x00704a,
            beer: 0xffca28,
            cocktail: 0xe040fb,
            pizza_sauce: 0xc62828,
            pizza_crust: 0xfbc02d,
            furniture: 0x5d4037,
            lamp_shade: 0xffeb3b,
            vr_headset: 0x212121
        };

        const gameState = {
            hasTicket: false,
            hasSuitcase: false,
            securityCleared: false,
            hasCoffee: false,
            drinksConsumed: 0,
            clubProgress: 0,
            farewellDone: false,
            callFinished: false,
            dressedForWork: false,
            hasVR: false,
            demosGiven: 0
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'text') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'select') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.linearRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'clink') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'club_beat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'vr_boop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'msg_sent') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'fire') {
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                noise.start(now);
            }
        }

        // --- Music Themes ---
        let currentMusicNodes = [];

        function stopMusic() {
            currentMusicNodes.forEach(node => {
                if(node.stop) node.stop();
                if(node.osc) try { node.osc.stop(); } catch(e){}
                if(node.gain) try { node.gain.disconnect(); } catch(e){}
            });
            currentMusicNodes = [];
        }

        function fadeOutMusic(duration) {
            const now = audioCtx.currentTime;
            currentMusicNodes.forEach(node => {
                if (node.gain && node.gain.gain) {
                    node.gain.gain.cancelScheduledValues(now);
                    node.gain.gain.setValueAtTime(node.gain.gain.value, now);
                    node.gain.gain.linearRampToValueAtTime(0, now + duration);
                }
                setTimeout(() => {
                    if(node.stop) node.stop();
                    if(node.osc) try { node.osc.stop(); } catch(e){}
                    if(node.gain) try { node.gain.disconnect(); } catch(e){}
                }, duration * 1000);
            });
            setTimeout(() => { currentMusicNodes = []; }, duration * 1000);
        }

        function playAirportTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const melody = [
                {f: 523.25, d: 0.2}, {f: 659.25, d: 0.2}, {f: 783.99, d: 0.2}, {f: 523.25, d: 0.4},
                {f: 659.25, d: 0.2}, {f: 783.99, d: 0.2}, {f: 1046.50, d: 0.4}
            ];

            function playNote(idx) {
                if(idx >= melody.length) idx = 0;
                const note = melody[idx];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.9);
                gain.gain.setValueAtTime(0.02, now); // Very quiet
                gain.gain.linearRampToValueAtTime(0, now + note.d * 0.9);
                
                if(Math.random() > 0.8) {
                    const noise = audioCtx.createOscillator();
                    const nGain = audioCtx.createGain();
                    noise.type = 'sawtooth';
                    noise.frequency.value = 50 + Math.random() * 100;
                    noise.connect(nGain);
                    nGain.connect(audioCtx.destination);
                    nGain.gain.setValueAtTime(0.005, now);
                    nGain.gain.linearRampToValueAtTime(0, now + 0.5);
                    noise.start(now);
                    noise.stop(now + 0.5);
                }

                const nextTime = note.d * 1000;
                const timer = setTimeout(() => playNote(idx + 1), nextTime + 200); // Slight pause
                currentMusicNodes.push({stop: () => clearTimeout(timer)});
            }
            playNote(0);
        }

        function playRomanticTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const freqs = [261.63, 329.63, 392.00, 493.88]; 
            freqs.forEach((f) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = f;
                osc.detune.value = (Math.random() - 0.5) * 10;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.03, now + 5);
                currentMusicNodes.push({osc, gain});
            });
        }
        
        function playBlueTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // "Blue" - Yung Kai melody approximation
            // Key: Eb Major/C minor feel usually, but simplified here to C major scale for implementation ease
            // "You're the sun..." (E D C...)
            const melody = [
                {f: 329.63, d: 0.6}, {f: 293.66, d: 0.3}, {f: 261.63, d: 1.2}, // E D C
                {f: 392.00, d: 0.6}, {f: 329.63, d: 0.3}, {f: 293.66, d: 1.2}, // G E D
                {f: 261.63, d: 0.6}, {f: 293.66, d: 0.3}, {f: 329.63, d: 0.6}, {f: 261.63, d: 0.6}, // C D E C
                {f: 196.00, d: 1.8}, // G (low)
                
                {f: 329.63, d: 0.6}, {f: 293.66, d: 0.3}, {f: 261.63, d: 1.2}, // E D C
                {f: 392.00, d: 0.6}, {f: 329.63, d: 0.3}, {f: 293.66, d: 1.2}, // G E D
            ];

            // Bass/Chords
            const now = audioCtx.currentTime;
            const padFreqs = [130.81, 196.00, 261.63]; // C G C
            padFreqs.forEach(f => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 2);
                currentMusicNodes.push({osc, gain});
            });

            function playNote(idx) {
                if(idx >= melody.length) idx = 0;
                const note = melody[idx];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; // Softer, dreamy sound
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.95);
                
                // Envelope
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.08, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + note.d * 0.95);
                
                const nextTime = note.d * 1000;
                const timer = setTimeout(() => playNote(idx + 1), nextTime);
                currentMusicNodes.push({stop: () => clearTimeout(timer)});
            }
            playNote(0);
        }

        function playConferenceTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const melody = [
                {f: 659.25, d: 0.4}, {f: 493.88, d: 0.2}, {f: 523.25, d: 0.2}, {f: 587.33, d: 0.4}, // E B C D
                {f: 523.25, d: 0.2}, {f: 493.88, d: 0.2}, {f: 440.00, d: 0.4}, {f: 440.00, d: 0.2}, // C B A A
                {f: 523.25, d: 0.2}, {f: 659.25, d: 0.4}, {f: 587.33, d: 0.2}, {f: 523.25, d: 0.2}, // C E D C
                {f: 493.88, d: 0.4}, {f: 493.88, d: 0.2}, {f: 523.25, d: 0.2}, {f: 587.33, d: 0.4}, // B B C D
                {f: 659.25, d: 0.4}, {f: 523.25, d: 0.4}, {f: 440.00, d: 0.4}, {f: 440.00, d: 0.4}  // E C A A
            ];
            function playNote(idx) {
                if(idx >= melody.length) idx = 0;
                const note = melody[idx];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.9);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + note.d * 0.9);
                const nextTime = note.d * 1000;
                const timer = setTimeout(() => playNote(idx + 1), nextTime);
                currentMusicNodes.push({stop: () => clearTimeout(timer)});
            }
            playNote(0);
        }

        function playDreamworksTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const melody = [
                {f: 392.00, d: 0.4}, {f: 523.25, d: 0.4}, {f: 659.25, d: 0.4}, {f: 783.99, d: 0.8},
                {f: 659.25, d: 0.4}, {f: 783.99, d: 0.4}, {f: 1046.5, d: 0.8},
                {f: 783.99, d: 0.4}, {f: 659.25, d: 0.4}, {f: 523.25, d: 0.8}
            ];
            function playNote(idx) {
                if (idx >= melody.length) return; 
                const note = melody[idx];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.95);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + note.d * 0.95);
                const timer = setTimeout(() => playNote(idx + 1), note.d * 1000);
                currentMusicNodes.push({stop: () => clearTimeout(timer)});
            }
            playNote(0);
        }

        function playBattleTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const melody = [
                {f: 110.00, d: 0.15}, {f: 130.81, d: 0.15}, {f: 146.83, d: 0.15}, {f: 130.81, d: 0.15},
                {f: 110.00, d: 0.15}, {f: 130.81, d: 0.15}, {f: 164.81, d: 0.15}, {f: 155.56, d: 0.15},
            ];
            function playNote(idx) {
                if(idx >= melody.length) idx = 0;
                const note = melody[idx];
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; 
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.8);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + note.d * 0.8);
                const timer = setTimeout(() => playNote(idx + 1), note.d * 1000);
                currentMusicNodes.push({stop: () => clearTimeout(timer)});
            }
            playNote(0);
        }

        function playLeFestinTheme() {
            stopMusic();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const melody = [
                {f: 392.00, d: 0.6}, {f: 440.00, d: 0.3}, {f: 392.00, d: 0.3}, // G A G
                {f: 329.63, d: 0.6}, {f: 392.00, d: 0.3}, {f: 329.63, d: 0.3}, // E G E
                {f: 261.63, d: 0.9}, // C...
                {f: 293.66, d: 0.3}, {f: 329.63, d: 0.3}, {f: 349.23, d: 0.3}, // D E F
                
                {f: 392.00, d: 0.6}, {f: 440.00, d: 0.3}, {f: 392.00, d: 0.3}, // G A G
                {f: 329.63, d: 0.6}, {f: 392.00, d: 0.3}, {f: 329.63, d: 0.3}, // E G E
                {f: 293.66, d: 0.9}, // D...
                
                {f: 523.25, d: 0.6}, {f: 493.88, d: 0.3}, {f: 440.00, d: 0.3}, // C B A
                {f: 392.00, d: 0.6}, {f: 349.23, d: 0.3}, {f: 329.63, d: 0.3}, // G F E
                {f: 293.66, d: 0.6}, {f: 329.63, d: 0.3}, {f: 349.23, d: 0.3}, // D E F
                {f: 392.00, d: 0.9}  // G...
            ];

            function playNote(idx) {
                if(idx >= melody.length) idx = 0;
                const note = melody[idx];
                const now = audioCtx.currentTime;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.value = note.f;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + note.d * 0.95);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.1);
                gain.gain.linearRampToValueAtTime(0, now + note.d * 0.95);

                if (idx % 3 === 0) { // On the "ONE" of the waltz
                    const chordOsc = audioCtx.createOscillator();
                    const chordGain = audioCtx.createGain();
                    chordOsc.type = 'triangle';
                    chordOsc.frequency.value = note.f / 2; 
                    chordOsc.connect(chordGain);
                    chordGain.connect(audioCtx.destination);
                    chordOsc.start(now);
                    chordOsc.stop(now + 0.3);
                    chordGain.gain.setValueAtTime(0.05, now);
                    chordGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    currentMusicNodes.push({osc: chordOsc, gain: chordGain});
                }

                const nextTime = note.d * 1000;
                const timer = setTimeout(() => playNote(idx + 1), nextTime);
                currentMusicNodes.push({stop: () => clearTimeout(timer), osc, gain});
            }
            playNote(0);
        }

        // --- Texture Generation ---
        function generateTextures(scene) {
            const g = scene.make.graphics();

            // --- HIGH RES PIXEL ART CHARACTERS (Stardew Style) ---

        // --- Classes ---
        class Player extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y) {
                super(scene, x, y, 'mike');
                scene.add.existing(this);
                scene.physics.add.existing(this);
                this.setCollideWorldBounds(true);
                this.body.setSize(16, 16);
                this.body.setOffset(8, 16);
                this.speed = 150;
                this.isLocked = false;
            }
            update(cursors) {
                this.setVelocity(0);
                if (window.isDialogueOpen || this.isLocked) return;
                let moved = false;
                if (cursors.left.isDown) { this.setVelocityX(-this.speed); this.setFlipX(true); moved = true; }
                else if (cursors.right.isDown) { this.setVelocityX(this.speed); this.setFlipX(false); moved = true; }
                if (cursors.up.isDown) { this.setVelocityY(-this.speed); moved = true; }
                else if (cursors.down.isDown) { this.setVelocityY(this.speed); moved = true; }
                if (moved) this.y += Math.sin(this.scene.time.now / 100) * 0.5;
            }
        }

        let typeWriterEvent = null;
        function showDialogue(text, callback) {
            if (window.isDialogueOpen) return;
            window.isDialogueOpen = true;
            
            const box = document.getElementById('dialogue-box');
            const textBox = document.getElementById('dialogue-text');
            const portraitFrame = document.getElementById('portrait-frame');
            const portraitImg = document.getElementById('portrait-img');
            
            document.getElementById('interaction-hint').style.display = 'none';
            box.style.display = 'flex'; 
            
            if (text.startsWith("Mike:") || text.startsWith("Mike picks") || text.startsWith("Mike cautiously") || text.startsWith("Mike sent:") || text.startsWith("Mike explains")) {
                portraitFrame.style.display = 'block';
                portraitImg.src = 'https://i.ibb.co/5XNnfJFc/IMG-8277.jpg';
            } else if (text.startsWith("Yvy:") || text.startsWith("Yvy waves:") || text.startsWith("Yvy wakes up:") || text.startsWith("Yvy replied:")) {
                portraitFrame.style.display = 'block';
                portraitImg.src = 'https://i.ibb.co/d0vKgfBs/IMG-8276.jpg';
            } else if (text.startsWith("Aiden:")) {
                portraitFrame.style.display = 'block';
                portraitImg.src = 'https://i.ibb.co/Ps8Dt9hQ/IMG-8339.jpg';
            } else {
                portraitFrame.style.display = 'none';
            }

            textBox.textContent = '';
            let i = 0;
            if (typeWriterEvent) clearInterval(typeWriterEvent);
            typeWriterEvent = setInterval(() => {
                textBox.textContent += text.charAt(i);
                if (text.charAt(i) !== ' ') playSound('text');
                i++;
                if (i >= text.length) {
                    clearInterval(typeWriterEvent);
                    const listener = (e) => {
                        if (e.code === 'Space') {
                            document.removeEventListener('keydown', listener);
                            box.style.display = 'none';
                            window.isDialogueOpen = false;
                            playSound('select');
                            if (callback) callback();
                        }
                    };
                    document.addEventListener('keydown', listener);
                }
            }, 25);
        }

                playBlueTheme();

                }

                                                    }); 
                                                }); 
                                            }); 
                                        }); 
                                    }); 
                                }); 
                            }); 
                        }); 
                    }); 
                } 
            }

                this.yvyStepmom = this.physics.add.sprite(180, 260, 'civilian').setTint(0xffccbc);
                
                // Mike's Family
                this.mikeMom = this.physics.add.sprite(650, 250, 'civilian').setTint(0xffaaaa);
                this.mikeDad = this.physics.add.sprite(680, 250, 'mike_suit').setTint(0x555555); 
                this.jocelyn = this.physics.add.sprite(710, 260, 'civilian').setTint(0xccaaff);

                // Cousin
                this.cousin = this.physics.add.sprite(400, 500, 'aiden').setTint(0xcccc55); 

                // Followers
                this.yvy = this.physics.add.sprite(this.player.x - 30, this.player.y, 'yvy');
                this.aiden = this.physics.add.sprite(this.player.x - 60, this.player.y, 'aiden');

                this.cursors = this.input.keyboard.createCursorKeys();
                this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                this.talkedState = { yvyFamily: false, mikeFamily: false, cousin: false };

                this.add.text(20, 550, "Talk to everyone! (Space)", { fontSize: '16px', color: '#fff' });

                this.physics.add.overlap(this.player, this.yvyFamilyZone, () => {
                     if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && !this.talkedState.yvyFamily) {
                         this.talkedState.yvyFamily = true;
                         showDialogue("Yvy's Dad: '¡Hola Miguel! ¿Cómo estás? Bienvenido.'", () => {
                             showDialogue("Mike (trying his best): 'Uh... Hola! Muy... good? Gracias?'", () => {
                                 showDialogue("Yvy's Stepmom laughs warmly: '¡Siéntate, come! La comida está deliciosa.'", () => {
                                     showDialogue("Mike: 'Si, si... delicioso!'", () => {
                                          showDialogue("They all laugh together, sharing a warm moment beyond language barriers.", () => {
                                              this.checkProgress();
                                          });
                                     });
                                 });
                             });
                         });
                     }
                });

                this.physics.add.overlap(this.player, this.mikeFamilyZone, () => {
                     if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && !this.talkedState.mikeFamily) {
                         this.talkedState.mikeFamily = true;
                         showDialogue("Mike's Mom: 'So glad you made it, Mike. The garden is blooming beautifully this year.'", () => {
                             showDialogue("Mike's Dad: 'The turkey came out perfect. Let's eat.'", () => {
                                 showDialogue("Jocelyn: 'It's so lively with everyone here! I love it.'", () => {
                                      showDialogue("Mike's family welcomes everyone with open arms.", () => {
                                          this.checkProgress();
                                      });
                                 });
                             });
                         });
                     }
                });

                this.physics.add.overlap(this.player, this.cousinZone, () => {
                     if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && !this.talkedState.cousin) {
                         this.talkedState.cousin = true;
                         showDialogue("Cousin: 'Bet you can't catch me!'", () => {
                             showDialogue("Aiden: 'I'm gonna get you!'", () => {
                                 showDialogue("Aiden runs off to play tag with his cousin, giggling uncontrollably.", () => {
                                     this.tweens.add({targets: this.aiden, x: this.cousin.x + 40, duration: 500, yoyo: true, repeat: 2});
                                     this.checkProgress();
                                 });
                             });
                         });
                     }
                });
            }

            update() {
                this.player.update(this.cursors);
                
                // Follow Logic
                if (this.player.body.velocity.length() > 5) {
                    this.physics.moveToObject(this.yvy, this.player, 140);
                    if (!this.talkedState.cousin) this.physics.moveToObject(this.aiden, this.player, 130); // Stop following if playing
                } else {
                     const distYvy = Phaser.Math.Distance.BetweenPoints(this.player, this.yvy);
                     if (distYvy < 60) this.yvy.body.stop();
                     
                     if (!this.talkedState.cousin) {
                        const distAiden = Phaser.Math.Distance.BetweenPoints(this.player, this.aiden);
                        if (distAiden < 60) this.aiden.body.stop();
                     }
                }
                
                const touching = this.physics.overlap(this.player, [this.yvyFamilyZone, this.mikeFamilyZone, this.cousinZone]);
                document.getElementById('interaction-hint').style.display = touching ? 'block' : 'none';
            }

            checkProgress() {
                if (this.talkedState.yvyFamily && this.talkedState.mikeFamily && this.talkedState.cousin) {
                    this.time.delayedCall(1000, () => {
                        fadeOutMusic(2);
                        showDialogue("Families blending together, sharing food and laughter.", () => {
                            this.scene.start('HomeScene');
                        });
                    });
                }
            }
        }

        class HomeScene extends Phaser.Scene {
            constructor() { super('HomeScene'); }
            preload() {
                this.load.image('riot_custom', 'https://i.ibb.co/HTG4krrJ/Screenshot-2026-02-12-172636-removebg-preview.png');
                this.load.image('snow_custom', 'https://i.ibb.co/mrFbGHwS/Screenshot-2026-02-12-174923-removebg-preview.png');
                this.load.image('beyonce_custom', 'https://i.ibb.co/1tDvXP0x/Untitled-design-removebg-preview.png');
                this.load.image('penny_custom', 'https://i.ibb.co/GvxG9K4t/4105a167-b4d8-4c7b-b622-604dfc54c45a-removebg-preview.png');
                this.load.image('bojji_custom', 'https://i.ibb.co/TqNj3DrS/Screenshot-2026-02-12-193330-removebg-preview.png');
                this.load.image('peaches_custom', 'https://i.ibb.co/ZzJ5dBV8/Screenshot-2026-02-12-193359-removebg-preview.png');
                this.load.image('lychee_custom', 'https://i.ibb.co/cKjz4rRH/4299678-middle-removebg-preview.png');
            }
            create() {
                this.cameras.main.setBackgroundColor('#8d6e63');
                for (let x=0; x<GAME_WIDTH/32; x++) for (let y=0; y<12; y++) this.add.image(x*32+16, y*32+16, 'floor_wood_detailed');
                for (let x=0; x<GAME_WIDTH/32; x++) for (let y=12; y<GAME_HEIGHT/32; y++) this.add.image(x*32+16, y*32+16, 'grass_detailed');
                const fences = this.physics.add.staticGroup();
                for(let x=0; x<GAME_WIDTH/32; x++) {
                    if (x < 10 || x > 14) {
                        this.add.image(x*32+16, 11*32+16, 'fence_detailed');
                        let barrier = this.add.rectangle(x*32+16, 11*32+16, 32, 32, 0, 0);
                        fences.add(barrier);
                    }
                }
                this.add.image(400, 200, 'fancy_rug').setScale(0.8);
                this.add.image(100, 400, 'bush_detailed'); this.add.image(140, 420, 'bush_detailed'); this.add.image(700, 400, 'bush_detailed');
                this.add.image(60, 500, 'flower_red'); this.add.image(90, 520, 'flower_red'); this.add.image(750, 500, 'flower_red');
                this.add.image(250, 450, 'dirt_patch'); this.add.image(400, 480, 'dirt_patch'); this.add.image(550, 440, 'dirt_patch');
                this.add.text(400, 40, "Their Beautiful Home", { fontSize: '24px', color: '#fff', backgroundColor: '#000' }).setOrigin(0.5);
                const outfit = this.game.registry.get('playerOutfit') || 'mike_suit';
                this.player = this.physics.add.sprite(280, 200, outfit);
                this.player.setCollideWorldBounds(true);
                this.physics.add.collider(this.player, fences);
                this.yvy = this.add.sprite(340, 200, 'yvy');
                this.mom = this.add.sprite(400, 200, 'civilian').setTint(0xffaaaa);
                this.aiden = this.add.sprite(460, 210, 'aiden_older');
                this.lychee = this.add.sprite(200, 250, 'lychee_custom'); this.lychee.setDisplaySize(24, 24);
                this.bojji = this.add.sprite(600, 300, 'bojji_custom'); this.bojji.setDisplaySize(48, 48);
                this.peaches = this.add.sprite(350, 280, 'peaches_custom'); this.peaches.setDisplaySize(32, 32);
                this.riot = this.add.sprite(250, 450, 'riot_custom'); this.riot.setDisplaySize(32, 32); 
                this.beyonce = this.add.sprite(400, 480, 'beyonce_custom'); this.beyonce.setDisplaySize(32, 32);
                this.snow = this.add.sprite(550, 440, 'snow_custom'); this.snow.setDisplaySize(32, 32);
                this.tweens.add({ targets: [this.riot, this.beyonce, this.snow], x: '+=20', y: '+=10', duration: 2000, yoyo: true, repeat: -1 });
                this.tweens.add({ targets: this.bojji, x: '-=30', duration: 3000, yoyo: true, repeat: -1 });
                this.tweens.add({ targets: this.peaches, x: 570, yoyo: true, repeat: -1, duration: 2000, flipX: true });
                this.time.delayedCall(1000, () => {
                    playRomanticTheme();
                    showDialogue("Mike and Yvy bought a house and end up growing their family.", () => {
                        showDialogue("They adopted Lychee the gray tabby, and Bojji the brown dog.", () => {
                            showDialogue("Then came the chickens: Riot, Beyonce, and Snow.", () => {
                                showDialogue("Yvy's mom got really ill and moved in with them. To ease the pain and because Yvy always wanted a Pomeranian, they adopted Peaches.", () => {
                                    showDialogue("Aiden grew up and is now 11. He's grown to love Mike and misses him when he travels to work.", () => {
                                        showDialogue("Aiden: 'I want to be like Mike when I grow up!'", () => {
                                            showDialogue("Aiden: 'Mike is PERFECT but mommy.. you're *IMPERFECTLY* PERFECT.'", () => {
                                                showDialogue("They have a beautiful home and as time passed, Mike, Yvy, and Aiden keep growing together as they learn to love every pixel of each other.", () => {
                                                    this.scene.start('PresentScene');
                                                });
                                            });
                                        });
                                    });
                                });
                            });
                        });
                    });
                });
            }
            update() { if (this.player && this.player.body) this.player.update(this.cursors); }
        }

        class PresentScene extends Phaser.Scene {
            constructor() { super('PresentScene'); }
            create() {
                this.cameras.main.setBackgroundColor('#ff9a9e');
                
                // --- SWITCHED TO BLUE THEME BY YUNG KAI ---
                playBlueTheme(); 

                this.add.rectangle(400, 150, 800, 300, 0xfecfef);
                this.add.circle(400, 300, 80, 0xffd700).setAlpha(0.8);
                this.add.rectangle(400, 450, 800, 300, 0x89c2d9);
                this.add.rectangle(400, 450, 800, 10, 0xffffff).setAlpha(0.3);
                this.add.rectangle(400, 550, 800, 100, 0x5d4037);
                for(let i=0; i<800; i+=40) this.add.rectangle(i+20, 500, 10, 50, 0x3e2723);
                this.add.rectangle(400, 480, 800, 10, 0x3e2723);
                const outfit = this.game.registry.get('playerOutfit') || 'mike_suit';
                this.player = this.add.sprite(350, 520, outfit);
                this.yvy = this.add.sprite(450, 520, 'yvy');
                this.aiden = this.add.sprite(400, 535, 'aiden_older'); 
                this.add.text(400, 50, "Present Day", { fontSize: '28px', color: '#fff', fontStyle: 'bold', backgroundColor: '#000' }).setOrigin(0.5);
                this.time.addEvent({
                    delay: 600, loop: true,
                    callback: () => {
                        let h = this.add.text(400 + (Math.random()-0.5)*100, 500, "❤️", { fontSize: '20px' });
                        this.tweens.add({ targets: h, y: 300, alpha: 0, duration: 2000, onComplete: () => h.destroy() });
                    }
                });
                this.time.delayedCall(1500, () => {
                    showDialogue("Mike: 'Every day with you feels like a dream.'", () => {
                        showDialogue("Yvy: 'I love you more today than I did yesterday.'", () => {
                            showDialogue("Mike: 'And I'll love you even more tomorrow.'", () => {
                                showDialogue("They stand together, looking out at the sunset, hand in hand.", () => {
                                    showDialogue("Their story continues, building a life full of love, laughter, and endless adventure.", () => {
                                        showDialogue("❤️ THE END ❤️", () => {});
                                    });
                                });
                            });
                        });
                    });
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: [TitleScene, AirportScene, FlightScene, BarScene, ClubScene, PizzaScene, MorningScene, ConferenceScene, UberScene, RestaurantScene, MovieScene, DriveToHotelScene, FancyHotelScene, DowntownScene, TravelScene, HouseScene, SurgeryScene, BurialScene, NewYearsScene, ApartmentScene, ThanksgivingScene, HomeScene, PresentScene],
            pixelArt: true
        };

        const game = new Phaser.Game(config);
    </script>
</body>
